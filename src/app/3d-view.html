<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moira 3D 查看与体素化</title>
  <link rel="stylesheet" href="./styles.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three/build/three.module.js",
      "three/addons/": "./vendor/three/jsm/"
    }
  }
  </script>

</head>

<body>
  <div id="app">
    <!-- 顶部导航栏 -->
    <header class="topbar glass">
      <div class="brand">
        <span class="brand-logo"></span>
        <div class="brand-text">
          <h1>Moira 3D</h1>
          <p>查看与体素化 · CFD Voxelizer</p>
        </div>
      </div>
      <div class="loadbar">
        <div class="input-wrap">
          <span class="input-icon">/</span>
          <input id="modelPath" type="text" value="airplane1.3mf" placeholder="模型相对路径，例如 airplane1.3mf"
            spellcheck="false" />
        </div>
        <button id="loadBtn" class="btn btn-primary">
          <span class="btn-glow"></span>加载模型
        </button>
        <label class="btn btn-ghost" for="fileInput">本地文件</label>
        <input id="fileInput" type="file" accept=".3mf,.obj,.stl,.ply,.dae,.glb,.gltf,.3ds" hidden />
      </div>
      <div class="fmt-hint">
        支持: 3MF · OBJ · STL · PLY · DAE · GLB · GLTF · 3DS
      </div>
      <button id="themeToggle" class="btn btn-ghost theme-toggle" title="切换亮 / 暗模式" aria-label="切换主题">
        <svg class="ic ic-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4.2"></circle>
          <g>
            <line x1="12" y1="2.5" x2="12" y2="5"></line>
            <line x1="12" y1="19" x2="12" y2="21.5"></line>
            <line x1="2.5" y1="12" x2="5" y2="12"></line>
            <line x1="19" y1="12" x2="21.5" y2="12"></line>
            <line x1="5.1" y1="5.1" x2="6.9" y2="6.9"></line>
            <line x1="17.1" y1="17.1" x2="18.9" y2="18.9"></line>
            <line x1="5.1" y1="18.9" x2="6.9" y2="17.1"></line>
            <line x1="17.1" y1="6.9" x2="18.9" y2="5.1"></line>
          </g>
        </svg>
        <svg class="ic ic-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 14.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 14.5z"></path>
        </svg>
      </button>
    </header>

    <!-- 左侧面板 -->
    <aside class="sidebar">
      <!-- 属性面板 -->
      <section class="panel glass">
        <div class="panel-head">
          <h2>模型属性</h2>
          <span id="modelType" class="tag">—</span>
        </div>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">顶点数</div>
            <div class="stat-value" id="statVertices">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">三角面数</div>
            <div class="stat-value" id="statFaces">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">对象数</div>
            <div class="stat-value" id="statObjects">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">点数(点云)</div>
            <div class="stat-value" id="statPoints">—</div>
          </div>
        </div>
        <div class="bbox-block">
          <div class="stat-label">包围盒尺寸 (W × H × D)</div>
          <div class="bbox-value" id="statBBox">—</div>
        </div>
      </section>

      <!-- 坐标轴旋转面板 -->
      <section class="panel glass">
        <div class="panel-head">
          <h2>坐标轴旋转</h2>
          <span class="tag">朝向</span>
        </div>
        <div class="rot-grid">
          <div class="rot-field">
            <label for="rotX">X</label>
            <input id="rotX" type="number" value="0" step="5" min="-180" max="180" />
            <span class="deg">°</span>
          </div>
          <div class="rot-field">
            <label for="rotY">Y</label>
            <input id="rotY" type="number" value="0" step="5" min="-180" max="180" />
            <span class="deg">°</span>
          </div>
          <div class="rot-field">
            <label for="rotZ">Z</label>
            <input id="rotZ" type="number" value="0" step="5" min="-180" max="180" />
            <span class="deg">°</span>
          </div>
        </div>
        <div class="btn-row">
          <button id="rotResetBtn" class="btn btn-ghost">重置朝向</button>
          <button id="rotLevelBtn" class="btn btn-ghost">水平化 (X −90°)</button>
        </div>
        <div class="rot-hint" id="rotHint">体素化将使用当前朝向</div>
      </section>

      <!-- 体素化面板 -->
      <section class="panel glass">
        <div class="panel-head">
          <h2>体素化 (CFD)</h2>
          <span class="tag tag-accent">泛洪填充</span>
        </div>

        <div class="field">
          <label>体素尺寸</label>
          <div class="voxel-auto-info" id="voxelAutoInfo">
            <span class="auto-hint">加载模型后将自动计算体素尺寸</span>
          </div>
        </div>

        <div class="btn-row">
          <button id="voxelizeBtn" class="btn btn-primary" disabled>
            <span class="btn-glow"></span>开始体素化
          </button>
          <button id="downloadBtn" class="btn btn-ghost" disabled>下载 JSON</button>
        </div>

        <div class="progress-wrap">
          <div class="progress-track">
            <div id="progressBar" class="progress-fill"></div>
          </div>
          <span id="progressText" class="progress-text">就绪</span>
        </div>

        <label class="check-row">
          <input type="checkbox" id="previewChk" checked />
          <span>在视口预览体素</span>
        </label>

        <div class="legend">
          <div class="legend-item"><span class="sw sw-0"></span>0 · 流体/外部空间</div>
          <div class="legend-item"><span class="sw sw-1"></span>1 · 固体边界</div>
        </div>

        <div class="voxel-summary" id="voxelSummary" hidden>
          <div class="vs-row"><span>网格维度</span><b id="vsDims">—</b></div>
          <div class="vs-row"><span>固体体素</span><b id="vsSolid">—</b></div>
          <div class="vs-row"><span>体素尺寸</span><b id="vsSize">—</b></div>
          <div class="vs-row"><span>耗时</span><b id="vsTime">—</b></div>
        </div>
      </section>
    </aside>

    <!-- 主视口 -->
    <main class="viewport">
      <canvas id="glCanvas"></canvas>
      <div class="viewport-overlay" id="loadingOverlay" hidden>
        <div class="spinner"></div>
        <span id="loadingText">加载中…</span>
      </div>
      <div class="view-controls glass">
        <button class="vc-btn" id="resetViewBtn" title="重置视角">⟳</button>
        <button class="vc-btn" id="toggleGridBtn" title="网格开关">▦</button>
        <button class="vc-btn" id="toggleWireBtn" title="线框模式">◇</button>
      </div>
    </main>

    <!-- 底部状态栏 -->
    <footer class="statusbar glass">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">等待加载模型…</span>
      <span class="status-spacer"></span>
      <span id="statusMeta"></span>
    </footer>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>

</html>
