<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CFD 可视化 · CFD Visualization</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="bg-[#F4F6FA] text-[#1E293B] font-sans antialiased">

  <!-- ===================== Header ===================== -->
  <header
    class="h-14 flex items-center justify-between px-5 bg-white border-b border-slate-200 shadow-sm z-20 relative">
    <div class="flex items-center gap-3">
      <div
        class="w-8 h-8 rounded-lg bg-gradient-to-br from-[#2563EB] to-[#0EA5E9] flex items-center justify-center text-white font-bold">
        C</div>
      <h1 class="text-[20px] font-semibold tracking-tight" data-i18n="appTitle">CFD 可视化</h1>
    </div>
    <div class="flex items-center gap-2">
      <button id="upload-btn"
        class="px-4 py-2 rounded-lg bg-[#2563EB] text-white text-[13px] font-medium hover:bg-[#1d4ed8] transition shadow-sm flex items-center gap-2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14" />
        </svg>
        <span data-i18n="uploadBtn">上传 demo 文件夹</span>
      </button>
      <input id="folder-input" type="file" webkitdirectory directory multiple class="hidden" />
      <button id="lang-toggle"
        class="px-3 py-2 rounded-lg border border-slate-200 bg-white text-[13px] font-medium hover:bg-slate-50 transition min-w-[64px]">
        <span id="lang-label">中 / EN</span>
      </button>
    </div>
  </header>

  <!-- ===================== Main ===================== -->
  <main class="flex" style="height: calc(100vh - 56px - 60px);">

    <!-- Left control panel -->
    <aside id="control-panel" class="w-72 shrink-0 bg-white border-r border-slate-200 overflow-y-auto p-4 space-y-4">

      <section class="card">
        <h2 class="card-title" data-i18n="secField">标量场</h2>
        <label class="lbl" data-i18n="fieldLabel">标量场</label>
        <select id="field-select" class="input"></select>
        <label class="lbl mt-3" data-i18n="colormapLabel">调色板</label>
        <select id="colormap-select" class="input"></select>
      </section>

      <section class="card">
        <h2 class="card-title" data-i18n="secRange">颜色值域</h2>
        <select id="range-mode" class="input">
          <option value="auto" data-i18n="rangeAuto">自动</option>
          <option value="manual" data-i18n="rangeManual">手动</option>
        </select>
        <div id="manual-range" class="hidden grid grid-cols-2 gap-2 mt-3">
          <div>
            <label class="lbl" data-i18n="rangeMin">最小值</label>
            <input id="range-min" type="number" step="any" class="input" />
          </div>
          <div>
            <label class="lbl" data-i18n="rangeMax">最大值</label>
            <input id="range-max" type="number" step="any" class="input" />
          </div>
        </div>
        <label class="lbl mt-3 flex justify-between">
          <span data-i18n="thresholdLabel">透明阈值</span>
          <span id="threshold-val" class="text-[#0EA5E9] font-medium">0.00</span>
        </label>
        <input id="threshold-slider" type="range" min="0" max="1" step="0.01" value="0" class="slider" />
      </section>

      <section class="card">
        <h2 class="card-title" data-i18n="secArrows">速度矢量箭头</h2>
        <label class="flex items-center justify-between cursor-pointer">
          <span class="lbl" data-i18n="arrowsToggle">显示箭头</span>
          <input id="arrows-toggle" type="checkbox" class="toggle" />
        </label>
        <label class="lbl mt-3" data-i18n="arrowsDensity">箭头密度</label>
        <select id="arrow-density" class="input">
          <option value="2" data-i18n="densityHigh">高 (2×2×2)</option>
          <option value="3" data-i18n="densityMid">中 (3×3×3)</option>
          <option value="4" data-i18n="densityLow">低 (4×4×4)</option>
        </select>
      </section>

      <section class="card">
        <h2 class="card-title" data-i18n="secSection">横截面</h2>
        <label class="flex items-center justify-between cursor-pointer">
          <span class="lbl" data-i18n="sectionEnable">启用</span>
          <input id="section-toggle" type="checkbox" class="toggle" />
        </label>
        <label class="lbl mt-3" data-i18n="sectionAxis">截面轴</label>
        <select id="section-axis" class="input">
          <option value="x" data-i18n="axisX">X 轴</option>
          <option value="y" data-i18n="axisY">Y 轴</option>
          <option value="z" data-i18n="axisZ">Z 轴</option>
        </select>
        <label class="lbl mt-3 flex justify-between">
          <span data-i18n="sectionPos">位置</span>
          <span id="section-pos-val" class="text-[#0EA5E9] font-medium">0</span>
        </label>
        <input id="section-pos" type="range" min="0" max="47" step="1" value="24" class="slider" />
      </section>
    </aside>

    <!-- Center viewport -->
    <section id="viewport" class="relative flex-1 bg-[#F4F6FA] overflow-hidden">
      <canvas id="three-canvas" class="w-full h-full block"></canvas>

      <!-- colorbar -->
      <div id="colorbar-wrap"
        class="absolute right-4 top-4 bg-white/85 backdrop-blur rounded-lg p-2 shadow-sm border border-slate-200 hidden">
        <div id="colorbar-title" class="text-[11px] font-medium text-center mb-1 text-[#475569]">—</div>
        <canvas id="colorbar" width="22" height="220"></canvas>
      </div>

      <!-- axis hint -->
      <div
        class="absolute left-4 bottom-4 text-[11px] text-[#475569] bg-white/80 rounded px-2 py-1 shadow-sm border border-slate-200">
        X · Y · Z
      </div>

      <!-- empty / loading state -->
      <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-center gap-3">
        <div
          class="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#2563EB] to-[#14B8A6] flex items-center justify-center text-white text-2xl">
          CFD</div>
        <p class="text-[#475569] text-[14px]" data-i18n="emptyHint">请点击右上角「上传 demo 文件夹」加载模拟结果</p>
        <p class="text-[#94a3b8] text-[12px]" data-i18n="emptyHint2">支持 metadata.json 与 frame_*.json 的文件夹</p>
      </div>

      <div id="loading" class="hidden absolute inset-0 flex items-center justify-center bg-white/60 backdrop-blur-sm">
        <div class="flex flex-col items-center gap-3">
          <div class="spinner"></div>
          <p id="loading-text" class="text-[13px] text-[#475569]" data-i18n="loading">加载中…</p>
        </div>
      </div>
    </section>

    <!-- Right info panel -->
    <aside id="info-panel" class="w-80 shrink-0 bg-white border-l border-slate-200 overflow-y-auto p-4 space-y-4">
      <section class="card">
        <h2 class="card-title" data-i18n="secVoxel">选中体素</h2>
        <div id="voxel-info" class="text-[13px] text-[#475569]" data-i18n="voxelEmpty">点击体素查看详情</div>
      </section>

      <section class="card">
        <h2 class="card-title" data-i18n="secTimeseries">时间序列</h2>
        <div id="ts-chart" class="w-full" style="height:200px;"></div>
        <div id="ts-progress" class="text-[11px] text-[#94a3b8] mt-1 hidden"></div>
      </section>

      <section class="card">
        <h2 class="card-title" data-i18n="secSlice">2D 横截面</h2>
        <canvas id="slice-canvas" class="w-full rounded-lg border border-slate-200 bg-slate-50" width="240"
          height="240"></canvas>
      </section>
    </aside>
  </main>

  <!-- ===================== Timeline ===================== -->
  <footer id="timeline" class="h-[60px] flex items-center gap-4 px-5 bg-white border-t border-slate-200">
    <button id="play-btn"
      class="w-10 h-10 rounded-full bg-[#2563EB] text-white flex items-center justify-center hover:bg-[#1d4ed8] transition disabled:opacity-40"
      disabled>
      <svg id="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z" />
      </svg>
    </button>
    <div class="flex items-center gap-2">
      <label class="lbl" data-i18n="speed">速度</label>
      <select id="speed-select" class="input w-20">
        <option value="2">2 fps</option>
        <option value="5" selected>5 fps</option>
        <option value="10">10 fps</option>
        <option value="20">20 fps</option>
        <option value="30">30 fps</option>
      </select>
    </div>
    <input id="frame-slider" type="range" min="0" max="0" step="1" value="0" class="slider flex-1" disabled />
    <div class="text-[12px] text-[#475569] tabular-nums whitespace-nowrap">
      <span id="frame-label">—</span> · <span id="time-label">—</span>
    </div>
  </footer>

  <!-- ===================== Scripts ===================== -->
  <script src="js/i18n.js"></script>
  <script src="js/colormaps.js"></script>
  <script src="js/dataLoader.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/viewer3d.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
